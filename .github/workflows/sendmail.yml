name: Send mail
on: push

jobs:
    mail:
        runs-on: ubuntu-latest

        steps:
        - name: print Ish
          run: echo "hello Ish"
        - name: Sending a mail
          if: ${{ always() }}

          uses: dawidd6/action-send-mail@v3
          with:
            host: smtp.google.com
      # Optional port (defaults to 465)
            port: 465
            account: ${{secrets.ACCOUNT}}
            password: ${{secrets.MAIL_PASSWORD}}
            sender: Ishwarya 
            from: ${{secrets.MAIL_ADDRESS}}
            to: sridevibala036@gmail.com
            subject: mail title.
            body: This is a mail to Ish! 


        