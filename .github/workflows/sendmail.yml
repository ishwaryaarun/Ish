name: Send mail
on: push

jobs:
    mail:
        runs-on: ubuntu-latest

        steps:
        - name: print Ish
          run: echo "hello world"
        - name: Sending a mail
          if: ${{ always() }}
          uses: devellany/send-mailer@v1.0.2
          with:
            host: smtp.google.com
            port: 465
            account: ${{secrets.ACCOUNT}}
            password: ${{secrets.MAIL_PASSWORD}}
            sender: devellany
            from: ${{secrets.MAIL_ADDRESS}}
            to: sridevibala036@gmail.com
            subject: mail title.
            body: your messages.


        