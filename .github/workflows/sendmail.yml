name: Send mail
on: push

jobs:
    mail:
        runs-on: ubuntu-latest

        steps:
        - name: print Ish
          run: echo "hello Ish"
        - name: Sending a mail
          if: ${{ always() }}

          uses: dawidd6/action-send-mail@v3
          with:
            server_address: smtp.gmail.com
            server_port: 465
            secure: true
            username: ${{ secrets.ACCOUNT }}
            password: ${{ secrets.MAIL_PASSWORD }}
            subject: mail title
            body: This is a mail to Ish!
            to: sridevibala036@gmail.com
            from: ${{ secrets.ACCOUNT }}

        